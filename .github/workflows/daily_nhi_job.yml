name: Daily NHI Drug Data Process and Upload

# Trigger the workflow:
# 1. Automatically via schedule (6:00 AM UTC everyday, which is 2:00 PM Taiwan time)
# 2. Manually via 'workflow_dispatch' (Run workflow button in the UI)
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  process-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip' # cache pip dependencies

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Process NHI Data (Exclude Zero Price)
        # We use the python script to download, process, and exclude $0 items
        run: python process_nhi.py --exclude-zero --output cleaned_nhi_data_no_zero.csv

      - name: Upload to Cloudflare R2
        # The python script 'upload_r2.py' will handle Boto3 S3 upload
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python upload_r2.py

      - name: Upload to Cloudflare D1
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
        run: python upload_d1.py --csv cleaned_nhi_data_no_zero.csv
